<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST :: MAIL</title>

    <link href="https://cdn.materialdesignicons.com/5.0.45/css/materialdesignicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Karla&family=Rubik:ital@1&display=swap" rel="stylesheet">

    <style>
        body,html{
            display:flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            font-family: 'Karla', sans-serif;
        }
        form{
            display:flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
            padding: 24px;
            border-radius: 8px
        }
        button{
            display: block;
            padding: 12px 24px;
            border: none;
            background-color: rgb(0, 132, 255);
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 80%;
        }
        button:hover{
            background-color: rgb(2, 98, 189);
        }
        input{
            border-radius: 50px;
        }
        input, textarea{
            border: 1px solid #888;
            font-size: 18px;
            padding: 16px 16px;
            margin: 24px 0;
            width: 80%;
        }
        textarea, button{
            border-radius: 8px;
        }
        h1{
            color: rgb(0, 132, 255);
            font-family: 'Rubik', sans-serif;
        }
        h1, h2, h3, h4 {
            font-weight: 500;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <form id="form">
        <h1>Manteng&aacute;monos en contacto!</h1>
        <h2>Realiza tus consultas en el siguiente formulario</h2>
        <input type="hidden" name="apikey" value="1234567890">
        <input type="text" name="subject" placeholder="asunto" required>
        <input type="text" name="name" placeholder="Nombre Apellido" required>
        <input type="text" name="mailfrom" placeholder="correo@correo.com" required>
        <textarea name="message" rows="10"></textarea>
        <button type="button" onclick="send()">ENVIAR</button>
    </form>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@9"></script>

    <script>
        function send(){
            $.ajax({ 
                accepts: {
                    mycustomtype: 'application/son'
                },
                url: "http://richard.dblopers.com/", 
                method: "POST", 
                data: $('#form').serialize(), 
                dataType: 'jsonp',
                crossDomain: true,
                contentType: "application/json",
            })
            .done(function( data, textStatus, jqXHR ) {
                Swal.fire(
                    'Enviado!',
                    'Tu mensaje fue derivado a nuestro equipo y se contactar&aacute;n contigo a la brevedad',
                    'success'
                )
            })
            .fail(function( jqXHR, textStatus, errorThrown ) {
                Swal.fire({
                    icon: 'error',
                    title: 'Oops...',
                    text: 'Algo ha ocurrido, vuelve a intentarlo mas tarde'
                })
            });
        }
    </script>
</body>
</html>
